# Auxiliar Contable Digital — despliegue beta en un VPS Docker (Hostinger).
# Producción usa PostgreSQL (servicio db). Los soportes (fotos) y respaldos
# viven en el volumen "datos"; la base en el volumen "pgdata". Ambos
# sobreviven a los redespliegues.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auxiliar}
      POSTGRES_USER: ${POSTGRES_USER:-auxiliar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auxiliar}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build: ./app
    ports:
      # Puerto público configurable: PUERTO_WEB en el .env (p. ej. 80 u 9500
      # si el 8000 del servidor ya está ocupado). El interno siempre es 8000.
      - "${PUERTO_WEB:-8000}:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_ORIGINS: ${DJANGO_CSRF_ORIGINS:-}
      DJANGO_TRAS_PROXY: ${DJANGO_TRAS_PROXY:-0}
      # Base de datos: PostgreSQL del servicio db (12-factor, el código no cambia)
      DATABASE_URL: postgres://${POSTGRES_USER:-auxiliar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-auxiliar}
      DJANGO_MEDIA_ROOT: /app/datos/media
      ALEGRA_EMAIL: ${ALEGRA_EMAIL:-}
      ALEGRA_TOKEN: ${ALEGRA_TOKEN:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      # Correo saliente. Por defecto consola; en producción se define por .env
      # (Microsoft Graph app-only, o SMTP como alternativa — ver .env.example).
      DJANGO_EMAIL_BACKEND: ${DJANGO_EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DJANGO_FROM_EMAIL: ${DJANGO_FROM_EMAIL:-alertas@auxiliar.local}
      MS_GRAPH_TENANT_ID: ${MS_GRAPH_TENANT_ID:-}
      MS_GRAPH_CLIENT_ID: ${MS_GRAPH_CLIENT_ID:-}
      MS_GRAPH_CLIENT_SECRET: ${MS_GRAPH_CLIENT_SECRET:-}
      DJANGO_EMAIL_HOST: ${DJANGO_EMAIL_HOST:-}
      DJANGO_EMAIL_PORT: ${DJANGO_EMAIL_PORT:-587}
      DJANGO_EMAIL_HOST_USER: ${DJANGO_EMAIL_HOST_USER:-}
      DJANGO_EMAIL_HOST_PASSWORD: ${DJANGO_EMAIL_HOST_PASSWORD:-}
      DJANGO_EMAIL_USE_TLS: ${DJANGO_EMAIL_USE_TLS:-1}
    volumes:
      - datos:/app/datos
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  datos:
  pgdata:
