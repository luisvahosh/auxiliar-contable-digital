# Auxiliar Contable Digital — despliegue beta en un VPS Docker (Hostinger).
# La base (sqlite) y los soportes (fotos) viven en el volumen "datos":
# sobreviven a los redespliegues. PostgreSQL llegará cambiando DATABASE_URL.
services:
  web:
    build: ./app
    ports:
      # Puerto público configurable: PUERTO_WEB en el .env (p. ej. 80 u 8080
      # si el 8000 del servidor ya está ocupado). El interno siempre es 8000.
      - "${PUERTO_WEB:-8000}:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_ORIGINS: ${DJANGO_CSRF_ORIGINS:-}
      DJANGO_TRAS_PROXY: ${DJANGO_TRAS_PROXY:-0}
      DATABASE_URL: sqlite:////app/datos/db.sqlite3
      DJANGO_MEDIA_ROOT: /app/datos/media
      ALEGRA_EMAIL: ${ALEGRA_EMAIL:-}
      ALEGRA_TOKEN: ${ALEGRA_TOKEN:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
    volumes:
      - datos:/app/datos
    restart: unless-stopped

volumes:
  datos:
